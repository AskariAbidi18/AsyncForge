services:

  postgres:
    image: postgres:17
    container_name: asyncforge-postgres

    restart: unless-stopped

    environment:
      POSTGRES_DB: asyncforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 18askari

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data


  redis:
    image: redis:7-alpine

    container_name: asyncforge-redis

    restart: unless-stopped

    ports:
      - "6379:6379"


  backend:
    build: .

    container_name: asyncforge-backend

    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    env_file:
      - .env.docker

    ports:
      - "8000:8000"

    command: >
      uvicorn app.main:app
      --host 0.0.0.0
      --port 8000
      --reload

    volumes:
      - .:/app


  worker:
    build: .

    container_name: asyncforge-worker

    restart: unless-stopped

    depends_on:
      - postgres
      - redis

    env_file:
      - .env.docker

    command: >
      python worker.py

    volumes:
      - .:/app


volumes:

  postgres_data:
